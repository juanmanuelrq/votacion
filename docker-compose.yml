version: "3.8"

services:
  votacion-app:
    image: node:18-alpine
    container_name: votacion_app
    restart: always
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=nodotech2026
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    ports:
      - "3000:3000"
    networks:
      - proxy
      - odoo_odoo_net

networks:
  proxy:
    external: true
  odoo_odoo_net:
    external: true
